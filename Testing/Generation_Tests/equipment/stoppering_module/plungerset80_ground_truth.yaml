asset_name: "PlungerSet80"
description: |
  Ground truth for the PlungerSet-80 Automated Stoppering Station (Elara Automation GmbH).
  Derived from EA-LC-PS080-EN Rev. 1.0 (lifecycle) and EA-NS-PS080.NodeSet2.xml Rev. 1.0 (OPC UA NodeSet).
  Covers all six selected submodels: Nameplate, HierarchicalStructures, AID,
  Skills, Capabilities, OperationalData.
  Communication protocol: OPC UA TCP Binary (port 4840), security mode SignAndEncrypt.
  OPC UA Namespace URI: http://elara-automation.de/UA/PlungerSet80/ (index 1 at runtime).

# required: true  -> must be present and correct; penalise if missing
# required: false -> value is available in documents; score if found, do not penalise absence

expected_submodels:

  # ── DigitalNameplate ────────────────────────────────────────────────────────
  DigitalNameplate:
    submodelElements:

      - idShort: ManufacturerName
        semanticId: "0112/2///61987#ABA565#009"
        expected_value_contains: "Elara Automation"
        opcua_source: "ns=1;s=PlungerSet80.Nameplate.Manufacturer"
        required: true

      - idShort: ManufacturerProductDesignation
        semanticId: "0112/2///61987#ABA567#009"
        expected_value_contains: "PlungerSet-80"
        opcua_source: "ns=1;s=PlungerSet80.Nameplate.Model"
        required: true

      - idShort: ContactInformation
        semanticId: "https://admin-shell.io/zvei/nameplate/1/0/ContactInformations/AddressInformation"
        required: true

      - idShort: OrderCodeOfManufacturer
        semanticId: "0112/2///61987#ABA950#008"
        expected_value_contains: "EA-PS080-230V-EU"
        opcua_source: "ns=1;s=PlungerSet80.Nameplate.OrderNumber"
        required: true

      - idShort: SerialNumber
        expected_value_contains: "EA-PS-2024-00391"
        opcua_source: "ns=1;s=PlungerSet80.SerialNumber"
        required: true

      - idShort: YearOfConstruction
        expected_value_contains: "2024"
        opcua_source: "ns=1;s=PlungerSet80.Nameplate.YearOfConstruction"
        required: false

      - idShort: DateOfManufacture
        expected_value_contains: "2024-03-22"
        required: false

      - idShort: CountryOfOrigin
        expected_value_contains: "DE"
        required: false

      - idShort: HardwareVersion
        expected_value_contains: "1.3"
        opcua_source: "ns=1;s=PlungerSet80.Nameplate.HardwareRevision"
        required: false

      - idShort: FirmwareVersion
        expected_value_contains: "1.4.2"
        opcua_source: "ns=1;s=PlungerSet80.FirmwareVersion"
        required: false

      - idShort: URIOfTheProduct
        expected_value_contains: "plungerset-80"
        opcua_source: "ns=1;s=PlungerSet80.Nameplate.ProductInstanceUri"
        required: false

      - idShort: ManufacturerProductFamily
        expected_value_contains: "PlungerSet"
        required: false

      - idShort: ManufacturerUri
        expected_value_contains: "elara-automation.de"
        opcua_source: "ns=1;s=PlungerSet80.Nameplate.ManufacturerUri"
        required: false

      - idShort: ManufacturerAddress
        expected_value_contains: "Stuttgart"
        required: false

  # ── HierarchicalStructures ──────────────────────────────────────────────────
  HierarchicalStructures:
    submodelElements:

      - idShort: ArcheType
        semanticId: "https://admin-shell.io/idta/HierarchicalStructures/ArcheType/1/0"
        expected_value_contains: "OneDown"
        required: true

      - idShort: EntryNode
        semanticId: "https://admin-shell.io/idta/HierarchicalStructures/EntryNode/1/0"
        opcua_source: "ns=1;i=1000"
        required: true

    children:
      - idShort: ESP32ControllerModule
        opcua_source: "ns=1;i=3040"
        required: true

      - idShort: L298NMotorControllerBoard
        opcua_source: "ns=1;i=3041"
        required: true

      - idShort: LiftMotor
        opcua_source: "ns=1;i=3042"
        required: true

      - idShort: LeadScrewAssembly
        opcua_source: "ns=1;i=3043"
        required: true

      - idShort: LinearInsertActuator
        opcua_source: "ns=1;i=3044"
        required: true

      - idShort: ServoFeedMotor
        opcua_source: "ns=1;i=3045"
        required: true

      - idShort: GearDriveAssembly
        required: false

      - idShort: HomingLimitSwitch
        opcua_source: "ns=1;i=3046"
        required: false

      - idShort: PlungerMagazineAssembly
        opcua_source: "ns=1;i=3047"
        required: false

  # ── AID (Asset Interfaces Description) — OPC UA ─────────────────────────────
  AID:
    interface_type: "OPC UA"
    submodelElements:

      - idShort: InterfaceOPCUA
        semanticId: "https://admin-shell.io/idta/AssetInterfacesDescription/1/0/Interface"
        required: true

      - idShort: EndpointMetadata
        path: [InterfaceOPCUA, EndpointMetadata]
        semanticId: "https://admin-shell.io/idta/AssetInterfacesDescription/1/0/EndpointMetadata"
        required: true
        expected_properties:
          protocol: "OPC UA"
          encoding: "TCP Binary"
          port: "4840"
          endpoint_url_pattern: "opc.tcp://plungerset80-{serialNumber}.local:4840"
          security_mode: "SignAndEncrypt"
          security_policy: "Basic256Sha256"
          namespace_uri: "http://elara-automation.de/UA/PlungerSet80/"
          namespace_index: "1"
          max_sessions: "4"
          session_watchdog_s: "120"

      - idShort: InteractionMetadata
        path: [InterfaceOPCUA, InteractionMetadata]
        semanticId: "https://admin-shell.io/idta/AssetInterfacesDescription/1/0/InteractionMetadata"
        required: true

    affordances:

      - idShort: State
        affordance_type: "property"
        opcua_node: "ns=1;s=PlungerSet80.State"
        opcua_node_id: "ns=1;i=3010"
        data_type: "String"
        access_level: "ReadWrite"
        min_sampling_ms: 500
        valid_values: ["IDLE", "RUNNING", "ERROR", "HOMING"]
        required: true

      - idShort: CycleTime
        affordance_type: "property"
        opcua_node: "ns=1;s=PlungerSet80.CycleTime"
        opcua_node_id: "ns=1;i=3011"
        data_type: "Double"
        unit: "seconds"
        access_level: "ReadOnly"
        required: false

      - idShort: MagazineCount
        affordance_type: "property"
        opcua_node: "ns=1;s=PlungerSet80.MagazineCount"
        opcua_node_id: "ns=1;i=3012"
        data_type: "Int32"
        access_level: "ReadWrite"
        min_value: 0
        max_value_standard: 4
        max_value_extended: 8
        required: false

      - idShort: FirmwareVersion
        affordance_type: "property"
        opcua_node: "ns=1;s=PlungerSet80.FirmwareVersion"
        opcua_node_id: "ns=1;i=3013"
        data_type: "String"
        access_level: "ReadOnly"
        required: false

      - idShort: ErrorCode
        affordance_type: "property"
        opcua_node: "ns=1;s=PlungerSet80.ErrorCode"
        opcua_node_id: "ns=1;i=3015"
        data_type: "UInt32"
        access_level: "ReadOnly"
        min_sampling_ms: 500
        bitmask_definitions:
          "0x0001": "HOMING_TIMEOUT"
          "0x0002": "INSERTION_FAULT"
          "0x0004": "SERVO_STALL"
          "0x0008": "MAGAZINE_EMPTY"
          "0x0010": "COMMS_WATCHDOG"
          "0x0020": "ACTUATOR_RETRACT"
        required: false

      - idShort: TotalCycles
        affordance_type: "property"
        opcua_node: "ns=1;i=3030"
        data_type: "UInt64"
        access_level: "ReadOnly"
        persistence: "non-volatile (NVS)"
        required: false

      - idShort: UptimeSeconds
        affordance_type: "property"
        opcua_node: "ns=1;i=3031"
        data_type: "UInt32"
        unit: "seconds"
        min_sampling_ms: 5000
        access_level: "ReadOnly"
        required: false

      - idShort: Start
        affordance_type: "action"
        opcua_node: "ns=1;s=PlungerSet80.Start"
        opcua_node_id: "ns=1;i=4010"
        method_type: "UAMethod"
        input_arguments: []
        output_arguments: []
        precondition: "State == IDLE AND MagazineCount > 0"
        status_on_reject: "Bad_InvalidState"
        required: true

      - idShort: Stop
        affordance_type: "action"
        opcua_node: "ns=1;s=PlungerSet80.Stop"
        opcua_node_id: "ns=1;i=4011"
        method_type: "UAMethod"
        input_arguments: []
        output_arguments: []
        precondition: "State == RUNNING"
        status_on_reject: "Bad_InvalidState"
        required: true

      - idShort: Home
        affordance_type: "action"
        opcua_node: "ns=1;s=PlungerSet80.Home"
        opcua_node_id: "ns=1;i=4012"
        method_type: "UAMethod"
        input_arguments: []
        output_arguments: []
        precondition: "Any state"
        timeout_s: 15
        fault_on_timeout: "HOMING_TIMEOUT (0x0001)"
        required: true

      - idShort: Reset
        affordance_type: "action"
        opcua_node: "ns=1;s=PlungerSet80.Reset"
        opcua_node_id: "ns=1;i=4013"
        method_type: "UAMethod"
        input_arguments: []
        output_arguments: []
        precondition: "State == ERROR"
        status_on_reject: "Bad_InvalidState"
        side_effects:
          - "ErrorCode set to 0x0000"
          - "State transitions ERROR -> IDLE"
          - "Does NOT re-home the lift"
        required: false

  # ── Skills ──────────────────────────────────────────────────────────────────
  Skills:
    submodelElements:

      - idShort: Start
        required: true
        invocation_mechanism: "OPC UA Method call"
        opcua_method_node: "ns=1;s=PlungerSet80.Start"
        precondition: "State == IDLE AND MagazineCount > 0"
        result_state: "RUNNING -> IDLE"
        side_effects:
          - "MagazineCount decremented by 1"
          - "CycleTime node updated on completion"
          - "LastCycleTimestamp node updated on completion"

      - idShort: Stop
        required: true
        invocation_mechanism: "OPC UA Method call"
        opcua_method_node: "ns=1;s=PlungerSet80.Stop"
        precondition: "State == RUNNING"
        result_state: "IDLE"
        side_effects:
          - "CycleTime NOT updated (partial cycle)"
          - "MagazineCount NOT decremented"
          - "Lift retracts to home position"

      - idShort: Home
        required: true
        invocation_mechanism: "OPC UA Method call"
        opcua_method_node: "ns=1;s=PlungerSet80.Home"
        precondition: "Any state"
        result_state: "HOMING -> IDLE"
        side_effects:
          - "Position reference set at lower limit switch"
          - "Must be called at least once after power-on before first Start"
          - "Generates HOMING_TIMEOUT (0x0001) if limit switch not reached within 15 s"

      - idShort: Reset
        required: false
        invocation_mechanism: "OPC UA Method call"
        opcua_method_node: "ns=1;s=PlungerSet80.Reset"
        precondition: "State == ERROR"
        result_state: "IDLE"
        side_effects:
          - "ErrorCode cleared to 0x0000"
          - "Home recommended after INSERTION_FAULT or ACTUATOR_RETRACT"

  # ── Capabilities ────────────────────────────────────────────────────────────
  Capabilities:
    submodelElements:

      - idShort: CapabilitySet
        required: true

    capabilities:

      - idShort: PlungerInsertion
        description: "Rubber plunger feeding from magazine and insertion via 12 V linear actuator (20 mm stroke, 50 N)."
        required: true

      - idShort: PlungerMagazineFeeding
        description: "SG90 servo screw mechanism; standard 4-plunger capacity; extended 8-plunger with EA-PS080-MAG-EXT."
        required: false

      - idShort: LiftPositioning
        description: "150 mm vertical travel, +/-0.5 mm repeatability after homing; shared platform with LinFill-120."
        required: false

      - idShort: OPCUAConnectivity
        description: "OPC UA TCP Binary server port 4840; None/Sign/SignAndEncrypt security; max 4 sessions; session watchdog 120 s."
        required: false

      - idShort: FaultDetectionAndReporting
        description: "Six-bit ErrorCode bitmask (UInt32) covering homing, insertion, servo, magazine, comms, and retraction faults."
        required: false

  # ── OperationalData ─────────────────────────────────────────────────────────
  OperationalData:
    submodelElements:

      - idShort: FillingState
        idShort_alternative: "StopperingState"
        required: true
        data_type: "string"
        opcua_source: "ns=1;s=PlungerSet80.State"
        valid_values: ["IDLE", "RUNNING", "ERROR", "HOMING"]
        update_trigger: "on state change"
        recommended_subscription_interval_ms: 500

      - idShort: CycleTime
        required: false
        data_type: "float"
        unit: "seconds"
        opcua_source: "ns=1;s=PlungerSet80.CycleTime"
        update_trigger: "on cycle completion (RUNNING -> IDLE)"

      - idShort: MagazineCount
        required: false
        data_type: "integer"
        opcua_source: "ns=1;s=PlungerSet80.MagazineCount"
        valid_range: "0-4 (standard), 0-8 (EA-PS080-MAG-EXT)"
        update_trigger: "decremented after each successful insertion"

      - idShort: ErrorCode
        required: false
        data_type: "uint32"
        opcua_source: "ns=1;s=PlungerSet80.ErrorCode"
        update_trigger: "on fault change"
        zero_means: "no active fault"

# ── Cross-submodel consistency checks ───────────────────────────────────────
expected_cross_references:
  - skill: Start
    references_aid_affordance: Start
    invocation: "OPC UA Method call on ns=1;s=PlungerSet80.Start"
  - skill: Stop
    references_aid_affordance: Stop
    invocation: "OPC UA Method call on ns=1;s=PlungerSet80.Stop"
  - skill: Home
    references_aid_affordance: Home
    invocation: "OPC UA Method call on ns=1;s=PlungerSet80.Home"
  - skill: Reset
    references_aid_affordance: Reset
    invocation: "OPC UA Method call on ns=1;s=PlungerSet80.Reset"
  - operational_data: FillingState
    references_aid_affordance: State
    opcua_node: "ns=1;s=PlungerSet80.State"
  - operational_data: CycleTime
    references_aid_affordance: CycleTime
    opcua_node: "ns=1;s=PlungerSet80.CycleTime"
  - operational_data: MagazineCount
    references_aid_affordance: MagazineCount
    opcua_node: "ns=1;s=PlungerSet80.MagazineCount"

# ── Negative checks ──────────────────────────────────────────────────────────
must_not_contain:
  - "MQTT"
  - "mqtt"
  - "{base}/filling"
  - "syringeweight"
  - "LinFill"
  - "linfill120"
  - "broker"
